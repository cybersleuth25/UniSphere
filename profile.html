<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>UniSphere Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@600&display=swap">
</head>
<body>
    <div class="profile-container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar">👤</div>
                <h2>Welcome, User!</h2>
            </div>
            <div class="profile-info">
                <p><strong>Email:</strong> user@example.com</p>
                <p><strong>Bio:</strong> A student at AIT, passionate about tech and community building.</p>
            </div>
            <button id="logoutBtn" class="btn secondary">Logout</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
